<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Projete Capoeira Liberdade</title>

<style>
body {
  font-family: Arial;
  background: #0b1220;
  color: white;
  padding: 20px;
}

.btn {
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}

.btn-primary { background: orange; color: white; }
.btn-secondary { background: #1e293b; color: white; }
.btn-success { background: green; color: white; }
.btn-danger { background: red; color: white; }

.saldo-positivo { color: #16a34a; }
.saldo-negativo { color: #dc2626; }

input, select {
  padding: 8px;
  margin: 5px 0;
  width: 100%;
}

table {
  width: 100%;
  background: white;
  color: black;
  margin-top: 20px;
  border-collapse: collapse;
}

td, th {
  padding: 10px;
  border-bottom: 1px solid #ccc;
}
</style>
</head>

<body>

<h1>Projete Capoeira Liberdade</h1>

<div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">
  <button class="btn btn-secondary" onclick="window.location.href='custos.html'">Abrir Custos</button>
</div>

<h2>Registrar venda</h2>

<button class="btn btn-secondary" onclick="adicionarProdutoRapido()">+ Produto rápido</button>

<br><br>

<input id="nomeCliente" placeholder="Nome cliente">
<input id="produto" placeholder="Produto">
<select id="categoria">
  <option>Hambúrguer</option>
  <option>Bebida</option>
</select>
<input id="quantidade" type="number" value="1">
<input id="preco" type="number" placeholder="Preço">

<button class="btn btn-primary" onclick="adicionarVenda()">Adicionar</button>

<h2>Resumo</h2>
<p>Faturamento: <span id="faturamento">R$0</span></p>
<p>Lucro: <span id="lucro">R$0</span></p>

<h2>Vendas</h2>
<table>
<thead>
<tr>
<th>Ordem</th>
<th>Hora</th>
<th>Cliente</th>
<th>Produto</th>
<th>Total</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>
let vendas = [];

function moeda(v){
  return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function hora(){
  return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function ordem(){
  return String(vendas.length+1).padStart(4,'0');
}

function adicionarProdutoRapido(){
  const nome = prompt("Produto:");
  const preco = prompt("Preço:");
  const categoria = prompt("Categoria:", "Hambúrguer");

  document.getElementById("produto").value = nome;
  document.getElementById("preco").value = preco;
  document.getElementById("categoria").value = categoria;
}

function adicionarVenda(){
  const venda = {
    ordem: ordem(),
    hora: hora(),
    cliente: document.getElementById("nomeCliente").value,
    produto: document.getElementById("produto").value,
    quantidade: Number(document.getElementById("quantidade").value),
    preco: Number(document.getElementById("preco").value)
  };

  vendas.push(venda);
  render();
}

function ticket(v){
  return `
PROJETE CAPOEIRA LIBERDADE
==========================
Pedido: #${v.ordem}
Hora: ${v.hora}
Cliente: ${v.cliente}
--------------------------
Produto: ${v.produto}
Qtd: ${v.quantidade}
Total: ${moeda(v.quantidade*v.preco)}
--------------------------
LIBERAR PREPARO
==========================
`;
}

function enviarWhats(v){
  const msg = encodeURIComponent(ticket(v));
  window.open("https://wa.me/?text="+msg);
}

function copiar(v){
  navigator.clipboard.writeText(ticket(v));
  alert("Copiado!");
}

function render(){
  let html="";
  let total=0;

  vendas.forEach(v=>{
    const t = v.quantidade*v.preco;
    total+=t;

    html+=`
<tr>
<td>#${v.ordem}</td>
<td>${v.hora}</td>
<td>${v.cliente}</td>
<td>${v.produto}</td>
<td>${moeda(t)}</td>
<td>
<button onclick='copiar(${JSON.stringify(v)})'>Copiar</button>
<button onclick='enviarWhats(${JSON.stringify(v)})'>Whats</button>
</td>
</tr>`;
  });

  document.getElementById("tabela").innerHTML = html;
  document.getElementById("faturamento").innerText = moeda(total);

  const lucroEl = document.getElementById("lucro");
  lucroEl.innerText = moeda(total);

  if(total>0) lucroEl.className="saldo-positivo";
  else if(total<0) lucroEl.className="saldo-negativo";
}

</script>

</body>
</html>
