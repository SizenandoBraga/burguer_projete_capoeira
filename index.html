<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Projete Capoeira Liberdade</title>
</head>
<body style="font-family: Arial; background:#0b1220; color:white; padding:20px;">

  <h1>Projete Capoeira Liberdade</h1>

  <div style="margin-top:20px; display:flex; gap:10px; flex-wrap:wrap;">
    
    <!-- IR PARA VENDAS (mesma página) -->
    <button onclick="alert('Use a aba de vendas abaixo')">
      Vendas
    </button>

    <!-- 🔥 ABRIR PAGINA DE CUSTOS (CORRETO) -->
    <button onclick="window.location.href='custos.html'">
      Custos do Evento
    </button>

    <!-- EXPORTAÇÃO -->
    <button onclick="exportar('vendas')">
      Exportar Vendas
    </button>

    <button onclick="exportar('custos')">
      Exportar Custos
    </button>

    <button onclick="exportar('completo')">
      Exportar Tudo
    </button>

  </div>

  <hr style="margin:30px 0;">

  <h2>Resumo</h2>
  <div id="resumo"></div>

  <script>
    const state = {
      vendas: [],
      custos: []
    };

    function exportar(tipo){
      if(tipo === 'custos'){
        window.location.href = 'custos.html';
        return;
      }

      alert('Exportação funcionando: ' + tipo);
    }

    function atualizar(){
      document.getElementById('resumo').innerHTML = `
        <p>Vendas: ${state.vendas.length}</p>
        <p>Custos: ${state.custos.length}</p>
      `;
    }

    atualizar();
  </script>

</body>
</html>
